<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-top: #fbf7ef;
      --panel: #fffaf2;
      --ink: #1f1b16;
      --muted: #6f665d;
      --line: #e6dccd;
      --accent: #a86f2f;
      --accent-strong: #7f4e1e;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #18140f;
      --bg-top: #1f1913;
      --panel: #211c14;
      --ink: #f0ead9;
      --muted: #9b9080;
      --line: #332c20;
      --accent: #d4913e;
      --accent-strong: #e8a84e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px;
      color: var(--ink);
      background:
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 100%);
      padding: 8px 10px 0;
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      display: grid;
      gap: 5px;
    }

    .top-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .brand {
      min-width: 0;
      flex: 1;
    }

    .brand h2 {
      font-size: 14px;
      line-height: 1.2;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
    }

    .brand p {
      color: var(--muted);
      line-height: 1.25;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 9px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .icon-btn svg {
      flex-shrink: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px;
      display: grid;
      gap: 6px;
      position: relative;
      box-shadow: 0 10px 24px rgba(37, 27, 16, 0.05);
    }

    .field label,
    .viewport-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input[type="text"],
    .field input[type="number"],
    .field textarea,
    .field input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 7px 9px;
      appearance: none;
      -webkit-appearance: none;
    }

    .field textarea {
      height: 92px;
      min-height: 92px;
      max-height: 92px;
      resize: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.45;
    }

    .file-meta {
      margin-top: 2px;
      font-size: 11px;
      line-height: 1.2;
      color: var(--muted);
      min-height: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewport-block {
      display: grid;
      gap: 6px;
    }

    .preset-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      height: 26px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 9px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .chip svg {
      flex-shrink: 0;
    }

    .width-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: end;
    }

    .width-row label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .primary {
      width: 100%;
      height: 34px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .primary:hover {
      background: var(--accent-strong);
    }

    .primary:disabled {
      opacity: 0.7;
      cursor: progress;
    }

    .progress {
      height: 5px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > div {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #e8c97a);
      transition: width 0.2s linear;
    }

    #status {
      height: 15px;
      font-size: 12px;
      line-height: 1.25;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    #status.error {
      color: #b42318;
    }

    #status.success {
      color: #1a7f37;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top-bar">
      <div class="brand">
        <h2>tempelhtml</h2>
        <p>Paste HTML, build locally.</p>
      </div>
      <div class="actions">
        <button id="benchmarkBtn" class="icon-btn" type="button" title="Open benchmark">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 3h7v7" />
            <path d="M10 14 21 3" />
            <path d="M21 14v7h-7" />
            <path d="M3 10V3h7" />
            <path d="M3 21l7-7" />
          </svg>
          Benchmark
        </button>
        <button id="themeBtn" class="icon-btn" type="button" title="Toggle theme">
          <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
          <span id="themeLabel">System</span>
        </button>
      </div>
    </div>

    <div class="panel">
      <div class="field">
        <label for="fileInput">HTML file</label>
        <input id="fileInput" type="file" accept=".html,.htm,text/html" />
        <div id="fileMeta" class="file-meta">No file selected.</div>
      </div>

      <div class="field">
        <label for="htmlInput">HTML input</label>
        <textarea id="htmlInput" placeholder="Paste raw HTML here..."></textarea>
      </div>

      <div class="viewport-block">
        <div class="viewport-head">
          <span>Viewport</span>
        </div>
        <div class="preset-chips">
          <button type="button" class="chip active" data-preset="desktop">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Desktop
          </button>
          <button type="button" class="chip" data-preset="tablet">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="17" r="1"/></svg>
            Tablet
          </button>
          <button type="button" class="chip" data-preset="mobile">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17" r="1"/></svg>
            Mobile
          </button>
        </div>
        <div class="width-row">
          <div class="field">
            <label for="widthInput">Width</label>
            <input id="widthInput" type="number" min="320" step="1" value="1440" />
          </div>
        </div>
      </div>

      <button id="buildBtn" class="primary" type="button">Convert &amp; Build</button>
      <div class="progress"><div id="progressFill"></div></div>
    </div>

    <div id="status" aria-live="polite"></div>
  </div>

  <script>
    const BENCHMARK_URL = 'https://figmaeval.vercel.app';
    const PRESETS = {
      desktop: { width: 1440, height: 900 },
      tablet: { width: 768, height: 1024 },
      mobile: { width: 375, height: 812 },
    };
    const THEMES = ['system', 'dark', 'light'];
    const THEME_ICONS = {
      system: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>',
      dark: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
      light: '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>',
    };
    const THEME_LABELS = { system: 'System', dark: 'Dark', light: 'Light' };

    const fileInput = document.getElementById('fileInput');
    const htmlInput = document.getElementById('htmlInput');
    const widthInput = document.getElementById('widthInput');
    const buildBtn = document.getElementById('buildBtn');
    const progressFill = document.getElementById('progressFill');
    const statusEl = document.getElementById('status');
    const fileMeta = document.getElementById('fileMeta');
    const benchmarkBtn = document.getElementById('benchmarkBtn');
    const themeBtn = document.getElementById('themeBtn');
    const themeIcon = document.getElementById('themeIcon');
    const themeLabel = document.getElementById('themeLabel');
    const htmlEl = document.documentElement;
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)');
    const chips = document.querySelectorAll('.chip[data-preset]');

    const store = {
      _mem: {},
      get(key) {
        try {
          return localStorage.getItem(key);
        } catch (error) {
          return this._mem[key] || null;
        }
      },
      set(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (error) {
          this._mem[key] = value;
        }
      },
    };

    const state = {
      currentTheme: store.get('tempelhtml-theme') || 'system',
      currentPreset: 'desktop',
      viewportHeight: PRESETS.desktop.height,
      selectedFile: null,
    };

    benchmarkBtn.addEventListener('click', () => {
      parent.postMessage({
        pluginMessage: { type: 'OPEN_BENCHMARK' },
      }, '*');
    });

    themeBtn.addEventListener('click', () => {
      const index = THEMES.indexOf(state.currentTheme);
      applyTheme(THEMES[(index + 1) % THEMES.length]);
    });

    sysDark.addEventListener('change', () => {
      if (state.currentTheme === 'system') {
        applyTheme('system');
      }
    });

    chips.forEach((chip) => {
      chip.addEventListener('click', () => {
        chips.forEach((item) => item.classList.remove('active'));
        chip.classList.add('active');
        const preset = PRESETS[chip.dataset.preset];
        if (!preset) {
          return;
        }
        state.currentPreset = chip.dataset.preset;
        state.viewportHeight = preset.height;
        widthInput.value = preset.width;
        setStatus('');
      });
    });

    widthInput.addEventListener('input', () => {
      chips.forEach((chip) => chip.classList.remove('active'));
    });

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        state.selectedFile = null;
        fileMeta.textContent = 'No file selected.';
        return;
      }

      if (!isHtmlFile(file)) {
        state.selectedFile = null;
        fileInput.value = '';
        fileMeta.textContent = 'No file selected.';
        setStatus('Select a .html file.', 'error');
        return;
      }

      try {
        const text = await file.text();
        if (!looksLikeHtml(text)) {
          throw new Error('The file does not look like HTML.');
        }

        state.selectedFile = file;
        htmlInput.value = text;
        fileMeta.textContent = file.name;
        setStatus(`Loaded ${file.name}.`, 'success');
      } catch (error) {
        state.selectedFile = null;
        fileInput.value = '';
        fileMeta.textContent = 'No file selected.';
        setStatus(error.message || 'Unable to read file.', 'error');
      }
    });

    buildBtn.addEventListener('click', () => {
      const html = htmlInput.value.trim();
      if (!html) {
        setStatus('Paste HTML or choose a file first.', 'error');
        return;
      }

      if (!looksLikeHtml(html)) {
        setStatus('The input does not look like HTML.', 'error');
        return;
      }

      const width = normalizeDimension(widthInput.value, PRESETS[state.currentPreset].width);
      const payload = {
        html,
        sourceName: state.selectedFile ? state.selectedFile.name : 'inline.html',
        viewport: {
          width,
          height: state.viewportHeight,
        },
      };

      buildBtn.disabled = true;
      progressFill.style.width = '0%';
      setStatus('Sending HTML to the local converter...');

      parent.postMessage({
        pluginMessage: {
          type: 'CONVERT_AND_BUILD',
          payload,
        },
      }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) {
        return;
      }

      if (msg.type === 'PROGRESS') {
        if (typeof msg.percent === 'number') {
          progressFill.style.width = `${msg.percent}%`;
        }
        setStatus(msg.text || 'Working...');
      }

      if (msg.type === 'DONE') {
        progressFill.style.width = '100%';
        const styleCount = msg.styles ? (Number(msg.styles.paint || 0) + Number(msg.styles.text || 0)) : 0;
        const styleText = styleCount > 0 ? ` and ${styleCount} local styles` : '';
        setStatus(`Done. Created ${msg.nodeCount} nodes${styleText}.`, 'success');
        buildBtn.disabled = false;
      }

      if (msg.type === 'ERROR') {
        setStatus(msg.message || 'Something went wrong.', 'error');
        buildBtn.disabled = false;
      }
    };

    applyTheme(state.currentTheme);
    fileMeta.textContent = 'No file selected.';

    function applyTheme(theme) {
      state.currentTheme = theme;
      store.set('tempelhtml-theme', theme);
      const isDark = theme === 'dark' || (theme === 'system' && sysDark.matches);
      htmlEl.setAttribute('data-theme', isDark ? 'dark' : 'light');
      themeIcon.innerHTML = THEME_ICONS[theme];
      themeLabel.textContent = THEME_LABELS[theme];
    }

    function setStatus(message, type = '') {
      statusEl.className = type;
      statusEl.textContent = message || '';
    }

    function normalizeDimension(value, fallback) {
      const number = Number.parseInt(value, 10);
      return Number.isFinite(number) && number >= 320 ? number : fallback;
    }

    function isHtmlFile(file) {
      const name = String(file && file.name ? file.name : '').toLowerCase();
      const type = String(file && file.type ? file.type : '').toLowerCase();
      const hasHtmlExtension = /\.(html?|htm)$/i.test(name);
      const allowedType = !type || type === 'text/html' || type === 'application/xhtml+xml' || type === 'application/octet-stream';
      return hasHtmlExtension && allowedType && !type.startsWith('image/');
    }

    function looksLikeHtml(value) {
      const text = String(value || '').trim();
      if (!text) {
        return false;
      }

      return /^<!doctype\s+html/i.test(text)
        || /<html[\s>]/i.test(text)
        || /<\/?[a-z][\s\S]*>/i.test(text);
    }
  </script>
</body>
</html>
